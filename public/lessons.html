<!DOCTYPE html>
<html>
<head>
  <title>View Lesson</title>
  <link rel="stylesheet" href="styles/lessons.css"/>
</head>
<body>
  <h1>Lesson Exercises</h1>
  <div id="lesson-name"></div>
  <div id="exercises"></div>
  <div id="new-exercise"></div>
  <div id="back"><a href="/">Back</a></div>

  <script>
    async function newExercise() {
      const urlParams = new URLSearchParams(window.location.search);
      const lessonId = urlParams.get('lesson_id');
      document.getElementById('new-exercise').innerHTML =
        `<a href="create-exercise?lesson_id=${lessonId}">Create Exercise</a>`;
    }

    async function loadLesson() {
      const urlParams = new URLSearchParams(window.location.search);
      const lessonId = urlParams.get('lesson_id');

      // 1) Fetch lesson details
      const lessonRes = await fetch(`/api/lessons?lessonId=${lessonId}`);
      const lessonData = await lessonRes.json();
      document.getElementById('lesson-name').innerHTML =
        `<h2>${lessonData.results[0].title}</h2>`;

      // 2) Fetch exercises for this lesson
      const exercisesRes = await fetch(`/api/exercises?lessonId=${lessonId}`);
      let exercises = [];
      try {
        const data = await exercisesRes.json();
        // data should be { success: true, exercises: [...] }
        if (data.success && Array.isArray(data.exercises)) {
          exercises = data.exercises;
        } else {
          console.warn('Unexpected exercises payload', data);
        }
      } catch (e) {
        console.error('Failed to parse exercises JSON:', e);
      }

      // 3) Render the exercises as clickable divs or 'test'
      const container = document.getElementById('exercises');
      container.innerHTML = exercises
        .map(ex => {
          if (ex.completed === false) {
            return `
              <div role="button"
                  tabindex="0"
                  onclick="window.location.href='exercises?lesson_id=${lessonId}&exercise_id=${ex.exerciseId}'"
                  onkeydown="if(event.key==='Enter'||event.key===' ') this.click();"
                  class="exercise-card">
                <h2>${ex.prompt}</h2>
              </div>
            `;
          } else {
            return `
              <div id="completed">
                <h2>${ex.prompt}</h2>
              </div>`;
          }
        })
        .join('');
    }

    newExercise();
    loadLesson();
  </script>
</body>
</html>
